<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work - B the B / Осколки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .auth-container {
            background: rgba(18,18,24,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #a0a0a0;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }

        .tab-btn.active {
            background: #7c3aed;
            color: white;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-field:focus {
            border-color: #7c3aed;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin: 8px 0;
        }

        .btn-primary:hover {
            background: #8b5cf6;
        }

        .tg-link {
            display: inline-block;
            padding: 10px 24px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-size: 14px;
            margin: 8px 0;
        }

        .error-message {
            color: #f87171;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }

        .main-screen {
            min-height: 100vh;
            padding: 20px;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px;
            background: rgba(18,18,24,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px;
            position: sticky;
            top: 20px;
            z-index: 10;
        }

        .nav-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: 30px;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .nav-btn.admin {
            color: #fbbf24;
        }

        .center-buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .big-btn {
            min-width: 160px;
            padding: 24px 32px;
            background: rgba(18,18,24,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            color: white;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .big-btn:hover {
            background: #7c3aed;
            transform: scale(1.05);
        }

        .balance-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: rgba(18,18,24,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            font-size: 18px;
            color: #a78bfa;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-content {
            background: rgba(18,18,24,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(18,18,24,0.95);
        }

        .modal-header h2 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #a0a0a0;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
        }

        .profile-field {
            margin-bottom: 20px;
        }

        .profile-field label {
            color: #a0a0a0;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
        }

        .profile-field .value {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 20px;
        }

        .hidden-text {
            filter: blur(4px);
            cursor: pointer;
        }

        .requisite-selector {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .requisite-option {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #a0a0a0;
            cursor: pointer;
            text-align: center;
        }

        .requisite-option.active {
            background: #7c3aed;
            color: white;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
        }

        .history-amount.positive { color: #4ade80; }
        .history-amount.negative { color: #f87171; }

        .upload-area {
            border: 2px dashed rgba(124,58,237,0.3);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            background: rgba(124,58,237,0.03);
            cursor: pointer;
            margin: 20px 0;
        }

        #receiptPreview {
            margin: 20px 0;
            text-align: center;
        }

        #previewImage {
            max-width: 100%;
            max-height: 200px;
            border-radius: 24px;
        }

        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: #a0a0a0;
            cursor: pointer;
        }

        .admin-tab.active {
            background: #7c3aed;
            color: white;
        }

        .admin-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .admin-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 8px;
        }

        .admin-btn.approve {
            background: rgba(34,197,94,0.2);
            color: #4ade80;
        }

        .admin-btn.reject {
            background: rgba(239,68,68,0.2);
            color: #f87171;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
        </div>

        <div class="auth-screen" id="authScreen">
            <div class="auth-container">
                <h1 class="logo">WORK</h1>
                <p class="subtitle">от B the B и Завода "Осколки"</p>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" id="loginTab">Вход</button>
                    <button class="tab-btn" id="registerTab">Регистрация</button>
                </div>

                <div class="auth-form" id="loginForm">
                    <input type="text" class="input-field" id="loginToken" placeholder="Введите токен">
                    <button class="btn-primary" id="loginBtn">Войти</button>
                </div>

                <div class="auth-form" id="registerForm" style="display: none;">
                    <input type="text" class="input-field" id="registerToken" placeholder="Введите токен">
                    <div style="text-align: center; margin: 16px 0;">
                        <a href="https://t.me/WorkBtheB_bot" target="_blank" class="tg-link">@WorkBtheB_bot</a>
                    </div>
                    <button class="btn-primary" id="checkTokenBtn">Проверить токен</button>
                    
                    <div id="requisitesForm" style="display: none;">
                        <h3 style="color: white; margin: 20px 0 10px;">Реквизиты</h3>
                        <input type="text" class="input-field" id="regPhone" placeholder="Телефон">
                        <input type="text" class="input-field" id="regCard" placeholder="Карта">
                        <input type="text" class="input-field" id="regSteam" placeholder="Steam">
                        <button class="btn-primary" id="completeRegistrationBtn">Зарегистрироваться</button>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>

        <div class="main-screen" id="mainScreen">
            <div class="top-bar">
                <button class="nav-btn" id="profileBtn">👤 Профиль</button>
                <button class="nav-btn" id="withdrawBtn">💰 Вывод</button>
                <button class="nav-btn" id="historyBtn">📜 История</button>
                <button class="nav-btn admin" id="adminBtn" style="display: none;">👑 Админ</button>
                <button class="nav-btn" id="adsBtn">📢 Реклама</button>
            </div>

            <div class="center-buttons">
                <button class="big-btn" id="wordleBtn">WORDLE</button>
                <button class="big-btn" id="receiptBtn">ЧЕК</button>
                <button class="big-btn" id="linksBtn">ССЫЛКИ</button>
            </div>

            <div class="balance-bar">
                <span>Баланс: <span id="userBalance">0.00</span> ₽</span>
            </div>
        </div>

        <!-- Модалки -->
        <div class="modal" id="profileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Профиль</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="profile-field">
                        <label>Имя</label>
                        <div class="value"><span id="profileName"></span></div>
                    </div>
                    <div class="profile-field">
                        <label>Токен</label>
                        <div class="value">
                            <span id="profileToken" class="hidden-text">••••••••</span>
                            <button class="small-btn" id="showToken">👁️</button>
                        </div>
                    </div>
                    <div class="profile-field">
                        <label>Телефон</label>
                        <div class="value"><span id="profilePhone"></span></div>
                    </div>
                    <div class="profile-field">
                        <label>Карта</label>
                        <div class="value"><span id="profileCard"></span></div>
                    </div>
                    <div class="profile-field">
                        <label>Steam</label>
                        <div class="value"><span id="profileSteam"></span></div>
                    </div>
                    <div class="profile-field">
                        <label>Стрик</label>
                        <div class="value"><span id="profileStreak"></span> дней</div>
                    </div>
                    <a href="https://t.me/WorkBtheB_bot" target="_blank" class="tg-link" style="display: block; text-align: center;">Перейти в Telegram</a>
                </div>
            </div>
        </div>

        <div class="modal" id="withdrawModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Вывод</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="number" class="input-field" id="withdrawAmount" placeholder="Сумма" min="20">
                    <div class="requisite-selector" id="requisiteSelector"></div>
                    <input type="password" class="input-field" id="withdrawSecret" placeholder="Секретный код">
                    <button class="btn-primary" id="withdrawSubmit">Вывести</button>
                </div>
            </div>
        </div>

        <div class="modal" id="historyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>История</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
        </div>

        <div class="modal" id="adminModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Админ</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="admin-tabs">
                        <button class="admin-tab active" data-tab="withdraws">💰 Выводы</button>
                    </div>
                    <div id="adminWithdraws"></div>
                </div>
            </div>
        </div>

        <div class="modal" id="receiptModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Загрузить чек</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <select class="input-field" id="receiptStore">
                        <option value="">Магазин</option>
                        <option value="Магнит">Магнит</option>
                        <option value="Пятерочка">Пятерочка</option>
                        <option value="Монетка">Монетка</option>
                        <option value="Чижик">Чижик</option>
                    </select>
                    <input type="date" class="input-field" id="receiptDate">
                    <div class="upload-area" id="dropArea">
                        <input type="file" id="receiptFile" accept="image/*" hidden>
                        <p>Нажмите или перетащите фото</p>
                    </div>
                    <div id="receiptPreview" style="display: none;">
                        <img id="previewImage" src="">
                    </div>
                    <button class="btn-primary" id="uploadReceiptBtn" disabled>Отправить</button>
                </div>
            </div>
        </div>

        <div class="modal" id="linksModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Ваша ссылка</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" class="input-field" id="userLink" readonly>
                    <button class="btn-primary" id="copyLink">Копировать</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbxRMcBowZJ0-thf2L_VWuAodFC1RZXdgjyrGv47Jt4_lxcMOkf72sVfE8o74lEWbtQK3A/exec',
            TG_BOT: '@WorkBtheB_bot',
            ADS_LINK: 'https://bthebfr.github.io/about/'
        };

        class WorkApp {
            constructor() {
                this.user = null;
                this.activeModal = null;
                this.registerToken = null;
                this.init();
            }

            async init() {
                this.showLoading();
                this.initEventListeners();

                const savedToken = localStorage.getItem('workToken');
                if (savedToken) {
                    const result = await this.api('login', { token: savedToken });
                    if (result.success && result.user) {
                        this.user = result.user;
                        this.showMainScreen();
                    } else {
                        this.showAuthScreen();
                    }
                } else {
                    this.showAuthScreen();
                }
            }

            async api(action, data = {}) {
                try {
                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, ...data })
                    });
                    return await response.json();
                } catch (e) {
                    return { success: false, error: 'Ошибка соединения' };
                }
            }

            showLoading() {
                document.getElementById('loadingScreen').style.display = 'flex';
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'none';
            }

            showAuthScreen() {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
            }

            showMainScreen() {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('userBalance').textContent = (this.user?.balance || 0).toFixed(2);
                
                if (this.user?.is_admin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            }

            showError(msg) {
                document.getElementById('errorMessage').textContent = msg;
                setTimeout(() => document.getElementById('errorMessage').textContent = '', 3000);
            }

            initEventListeners() {
                document.getElementById('loginTab').addEventListener('click', () => {
                    document.getElementById('loginTab').classList.add('active');
                    document.getElementById('registerTab').classList.remove('active');
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('registerForm').style.display = 'none';
                });

                document.getElementById('registerTab').addEventListener('click', () => {
                    document.getElementById('registerTab').classList.add('active');
                    document.getElementById('loginTab').classList.remove('active');
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block';
                });

                document.getElementById('loginBtn').addEventListener('click', async () => {
                    const token = document.getElementById('loginToken').value.trim();
                    if (!token) return this.showError('Введите токен');

                    const result = await this.api('login', { token });
                    if (result.success && result.user) {
                        this.user = result.user;
                        localStorage.setItem('workToken', token);
                        this.showMainScreen();
                    } else {
                        this.showError('Неверный токен');
                    }
                });

                document.getElementById('checkTokenBtn').addEventListener('click', async () => {
                    const token = document.getElementById('registerToken').value.trim();
                    if (!token) return this.showError('Введите токен');

                    const result = await this.api('checkToken', { token });
                    if (result.success && result.exists) {
                        if (result.registered) {
                            this.showError('Токен уже зарегистрирован');
                        } else {
                            this.registerToken = token;
                            document.getElementById('requisitesForm').style.display = 'block';
                            document.getElementById('registerToken').disabled = true;
                        }
                    } else {
                        this.showError('Токен не найден');
                    }
                });

                document.getElementById('completeRegistrationBtn').addEventListener('click', async () => {
                    const phone = document.getElementById('regPhone').value;
                    const card = document.getElementById('regCard').value;
                    const steam = document.getElementById('regSteam').value;

                    if (!phone && !card && !steam) {
                        return this.showError('Заполните хотя бы один реквизит');
                    }

                    const result = await this.api('saveRequisites', {
                        token: this.registerToken,
                        phone, card, steam
                    });

                    if (result.success) {
                        const login = await this.api('login', { token: this.registerToken });
                        if (login.success) {
                            this.user = login.user;
                            localStorage.setItem('workToken', this.registerToken);
                            this.showMainScreen();
                        }
                    }
                });

                document.getElementById('profileBtn').addEventListener('click', () => this.showProfile());
                document.getElementById('withdrawBtn').addEventListener('click', () => this.showWithdraw());
                document.getElementById('historyBtn').addEventListener('click', () => this.showHistory());
                document.getElementById('adminBtn').addEventListener('click', () => this.showAdmin());
                document.getElementById('adsBtn').addEventListener('click', () => window.open(CONFIG.ADS_LINK, '_blank'));
                document.getElementById('wordleBtn').addEventListener('click', () => alert('Скоро будет'));
                document.getElementById('receiptBtn').addEventListener('click', () => this.showReceipt());
                document.getElementById('linksBtn').addEventListener('click', () => this.showLinks());

                document.querySelectorAll('.close-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        btn.closest('.modal').style.display = 'none';
                        this.activeModal = null;
                    });
                });

                document.getElementById('showToken').addEventListener('click', () => {
                    const span = document.getElementById('profileToken');
                    span.classList.remove('hidden-text');
                    span.textContent = this.user.token;
                });

                const dropArea = document.getElementById('dropArea');
                const fileInput = document.getElementById('receiptFile');
                
                dropArea.addEventListener('click', () => fileInput.click());
                dropArea.addEventListener('dragover', (e) => e.preventDefault());
                dropArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (e.dataTransfer.files[0]) this.handleFile(e.dataTransfer.files[0]);
                });
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) this.handleFile(e.target.files[0]);
                });

                document.getElementById('uploadReceiptBtn').addEventListener('click', () => this.uploadReceipt());
                document.getElementById('withdrawSubmit').addEventListener('click', () => this.submitWithdraw());
                document.getElementById('copyLink').addEventListener('click', () => {
                    document.getElementById('userLink').select();
                    document.execCommand('copy');
                    alert('Скопировано');
                });
            }

            handleFile(file) {
                if (!file.type.startsWith('image/')) return alert('Нужно изображение');
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('receiptPreview').style.display = 'block';
                    document.getElementById('uploadReceiptBtn').disabled = false;
                };
                reader.readAsDataURL(file);
            }

            async uploadReceipt() {
                const store = document.getElementById('receiptStore').value;
                const date = document.getElementById('receiptDate').value;
                const photo = document.getElementById('previewImage').src;

                if (!store || !date) return alert('Заполните все поля');

                const result = await this.api('uploadReceipt', {
                    token: this.user.token,
                    store,
                    photo,
                    receiptDate: date
                });

                if (result.success) {
                    alert('Чек отправлен!');
                    document.getElementById('receiptModal').style.display = 'none';
                }
            }

            async showProfile() {
                if (this.activeModal) this.activeModal.style.display = 'none';
                const modal = document.getElementById('profileModal');
                
                document.getElementById('profileName').textContent = this.user.name;
                document.getElementById('profilePhone').textContent = this.user.phone || '—';
                document.getElementById('profileCard').textContent = this.user.card || '—';
                document.getElementById('profileSteam').textContent = this.user.steam || '—';
                document.getElementById('profileStreak').textContent = this.user.streak || 0;
                
                modal.style.display = 'flex';
                this.activeModal = modal;
            }

            async showWithdraw() {
                if (this.activeModal) this.activeModal.style.display = 'none';
                const modal = document.getElementById('withdrawModal');
                const selector = document.getElementById('requisiteSelector');
                
                selector.innerHTML = '';
                if (this.user.phone) selector.innerHTML += `<div class="requisite-option" data-type="phone">📱 Телефон</div>`;
                if (this.user.card) selector.innerHTML += `<div class="requisite-option" data-type="card">💳 Карта</div>`;
                if (this.user.steam) selector.innerHTML += `<div class="requisite-option" data-type="steam">🎮 Steam</div>`;

                document.querySelectorAll('.requisite-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        document.querySelectorAll('.requisite-option').forEach(o => o.classList.remove('active'));
                        this.classList.add('active');
                    });
                });

                modal.style.display = 'flex';
                this.activeModal = modal;
            }

            async submitWithdraw() {
                const amount = parseFloat(document.getElementById('withdrawAmount').value);
                const type = document.querySelector('.requisite-option.active')?.dataset.type;
                const secret = document.getElementById('withdrawSecret').value;

                if (!amount || amount < 20) return alert('Минимум 20 ₽');
                if (!type) return alert('Выберите реквизит');
                if (!secret) return alert('Введите код');

                const result = await this.api('withdraw', {
                    token: this.user.token,
                    amount,
                    requisiteType: type,
                    secretCode: secret
                });

                if (result.success) {
                    alert('Заявка создана!');
                    document.getElementById('withdrawModal').style.display = 'none';
                } else {
                    alert(result.error);
                }
            }

            async showHistory() {
                if (this.activeModal) this.activeModal.style.display = 'none';
                const modal = document.getElementById('historyModal');
                const list = document.getElementById('historyList');

                list.innerHTML = 'Загрузка...';
                modal.style.display = 'flex';
                this.activeModal = modal;

                const result = await this.api('getHistory', { token: this.user.token });
                if (result.success && result.history) {
                    list.innerHTML = '';
                    result.history.forEach(item => {
                        list.innerHTML += `
                            <div class="history-item">
                                <div>${item.details || item.action}<br><small>${item.date}</small></div>
                                <div class="history-amount ${item.amount > 0 ? 'positive' : 'negative'}">
                                    ${item.amount > 0 ? '+' : ''}${item.amount} ₽
                                </div>
                            </div>
                        `;
                    });
                }
            }

            async showAdmin() {
                if (!this.user?.is_admin) return;
                if (this.activeModal) this.activeModal.style.display = 'none';
                
                const modal = document.getElementById('adminModal');
                modal.style.display = 'flex';
                this.activeModal = modal;

                const result = await this.api('adminGetPending', { token: this.user.token });
                if (result.success && result.withdraws) {
                    const div = document.getElementById('adminWithdraws');
                    div.innerHTML = '';
                    result.withdraws.forEach(w => {
                        div.innerHTML += `
                            <div class="admin-item">
                                <p>ID: ${w.id} | ${w.token} | ${w.amount} ₽</p>
                                <p>${w.requisiteType} - ${w.requisite}</p>
                                <button class="admin-btn approve" onclick="app.approveWithdraw('${w.id}')">✅</button>
                                <button class="admin-btn reject" onclick="app.rejectWithdraw('${w.id}')">❌</button>
                            </div>
                        `;
                    });
                }
            }

            async approveWithdraw(id) {
                const result = await this.api('adminApproveWithdraw', {
                    token: this.user.token,
                    withdrawId: id
                });
                if (result.success) this.showAdmin();
            }

            async rejectWithdraw(id) {
                const reason = prompt('Причина:');
                if (!reason) return;
                const result = await this.api('adminRejectWithdraw', {
                    token: this.user.token,
                    withdrawId: id,
                    reason
                });
                if (result.success) this.showAdmin();
            }

            showReceipt() {
                if (this.activeModal) this.activeModal.style.display = 'none';
                const modal = document.getElementById('receiptModal');
                document.getElementById('receiptDate').value = new Date().toISOString().split('T')[0];
                modal.style.display = 'flex';
                this.activeModal = modal;
            }

            showLinks() {
                if (this.activeModal) this.activeModal.style.display = 'none';
                const modal = document.getElementById('linksModal');
                document.getElementById('userLink').value = `https://work-btheb.ru/r/${this.user.token}`;
                modal.style.display = 'flex';
                this.activeModal = modal;
            }
        }

        const app = new WorkApp();
        window.app = app;
    </script>
</body>
</html>
